<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join The Hive | Nectar Meadery</title>
    <link href="assets/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(28, 25, 23, 0.8), rgba(28, 25, 23, 0.8)), url('https://images.unsplash.com/photo-1473973266408-ed4e27abdd47?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            padding: 20px;
        }

        .auth-card {
            background: var(--surface);
            padding: 50px;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            box-shadow: var(--shadow);
        }

        @media (max-width: 1024px) {
            .rtl-toggle, .theme-toggle {
                display: none !important;
            }
        }
    </style>
</head>

<body>
    <div class="auth-container position-relative">
        <button class="theme-toggle position-absolute" style="top: 30px; right: 95px; z-index: 1000; margin: 0;"><i class="fas fa-moon"></i></button>
        <button class="rtl-toggle position-absolute" style="top: 30px; right: 30px; z-index: 1000; margin: 0;">RTL</button>
        <div class="auth-card fade-up">
            <a href="index.html" class="logo mb-4 d-flex justify-content-center"><i class="fas fa-wine-glass me-2"></i>NECTAR</a>
            <h2 class="mb-2 text-center">Create an Account</h2>
            <p class="text-muted mb-4 small text-center">Join our community of craft beverage enthusiasts.</p>
            <form>
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label">First Name</label>
                        <input type="text" class="form-control">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Last Name</label>
                        <input type="text" class="form-control">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Password</label>
                        <div class="password-field-wrapper">
                            <input type="password" class="form-control">
                            <button type="button" class="password-toggle">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Confirm Password</label>
                        <div class="password-field-wrapper">
                            <input type="password" class="form-control">
                            <button type="button" class="password-toggle">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="terms">
                            <label class="form-check-label small" for="terms">I agree to the <a href="#"
                                    class="color-accent">Terms of Service</a> and <a href="#"
                                    class="color-accent">Privacy Policy</a>.</label>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-3 mt-4">Create Account</button>

                <div class="social-auth">
                    <div class="divider">Or join with</div>
                    <div class="social-auth-btns">
                        <button type="button" class="btn-social">
                            <i class="fab fa-google"></i> Google
                        </button>
                        <button type="button" class="btn-social">
                            <i class="fab fa-apple"></i> Apple
                        </button>
                    </div>
                </div>
            </form>
            <p class="mt-4 text-muted small text-center">Already have an account? <a href="login.html"
                    class="color-accent fw-bold">Sign in</a></p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="assets/js/animations.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
