<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Nectar Meadery</title>
    <link href="assets/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(28, 25, 23, 0.8), rgba(28, 25, 23, 0.8)), url('https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            padding: 20px;
        }

        .auth-card {
            background: var(--surface);
            padding: 50px;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            box-shadow: var(--shadow);
        }
    </style>
</head>

<body>
    <div class="auth-container position-relative">
        <button class="rtl-toggle position-absolute" style="top: 30px; right: 30px; z-index: 1000; margin: 0;">RTL</button>
        <div class="auth-card fade-up">
            <a href="index.html" class="logo mb-4 d-flex justify-content-center"><i class="fas fa-wine-glass me-2"></i>NECTAR</a>
            <h2 class="mb-4 text-center">Welcome Back</h2>
            <form>
                <div class="form-group mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control">
                </div>
                <div class="form-group mb-4">
                    <label class="form-label">Password</label>
                    <div class="password-field-wrapper">
                        <input type="password" class="form-control">
                        <button type="button" class="password-toggle">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div class="d-flex justify-content-between align-items-center mb-4 flex-nowrap">
                    <div class="form-check mb-0">
                        <input type="checkbox" class="form-check-input" id="remember">
                        <label class="form-check-label" for="remember" style="font-size: 0.75rem;">Remember me</label>
                    </div>
                    <a href="#" class="color-accent fw-medium" style="font-size: 0.75rem; white-space: nowrap;">Forgot password?</a>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-3">Sign In</button>

                <div class="social-auth">
                    <div class="divider">Or continue with</div>
                    <div class="social-auth-btns">
                        <button type="button" class="btn-social">
                            <i class="fab fa-google"></i> Google
                        </button>
                        <button type="button" class="btn-social">
                            <i class="fab fa-apple"></i> Apple
                        </button>
                    </div>
                </div>
            </form>
            <p class="mt-4 text-muted small text-center">Don't have an account? <a href="signup.html"
                    class="color-accent fw-bold">Sign up</a></p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="assets/js/animations.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
